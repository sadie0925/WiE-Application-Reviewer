name: Co-op Listing Submission
description: Submit a co-op or internship posting
title: "[Co-op Listing] "
labels: ["coop-submission"]
body:
  - type: input
    id: company
    attributes:
      label: Company Name
      placeholder: "e.g. Google"
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Job Title
      placeholder: "e.g. Software Engineering Intern - Summer 2026"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Application URL
      placeholder: "https://..."
    validations:
      required: true

  - type: input
    id: locations
    attributes:
      label: Location(s)
      placeholder: "San Francisco, CA or Toronto, ON"
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        A maintainer will review your submission. Once the `approved` label is added,
        a GitHub Action will automatically add it to `coop-internships/listings.json`.

        Listings are grouped by **Canada / United States** and **CS/software vs other programs**.
        Only US and Canada locations are accepted. Season/term is not collected (titles are enough).
