name: Co-op Update README

on:
  push:
    paths:
      - "coop-internships/listings.json"
  workflow_dispatch:

concurrency:
  group: coop-update-readme
  cancel-in-progress: true

jobs:
  readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate README
        working-directory: coop-internships
        run: python main.py readme

      - name: Commit README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coop-internships/README.md
          git diff --staged --quiet || \
            git commit -m "docs: regenerate co-op README from listings.json"

      - name: Push
        run: git push
