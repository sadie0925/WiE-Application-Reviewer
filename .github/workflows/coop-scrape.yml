name: Co-op Scrape Listings

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: coop-scrape-listings
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run scrapers
        working-directory: coop-internships
        run: python main.py scrape

      - name: Commit listings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coop-internships/listings.json
          git diff --staged --quiet || \
            git commit -m "chore: update co-op listings.json from scraper ($(date -u +%Y-%m-%d))"

      - name: Push
        run: git push
