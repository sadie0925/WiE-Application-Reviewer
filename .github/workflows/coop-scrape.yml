name: Co-op Sync Listings

on:
  schedule:
    # Every 6 hours — one HTTP request to Simplify feed, low load
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: coop-sync-listings
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Sync from Simplify feed
        working-directory: coop-internships
        run: python main.py sync

      - name: Commit listings.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coop-internships/listings.json coop-internships/.listings-hash
          git diff --staged --quiet || \
            git commit -m "chore: sync co-op listings from Simplify feed ($(date -u +%Y-%m-%d))"

      - name: Push
        run: git push
